services:
  mongo:
    image: mongo:7
    ports: ["27017:27017"]
    volumes: ["nexus_mongo:/data/db"]

  redis:
    image: redis:alpine
    ports: [ "6379:6379" ]

  redisinsight:
    image: redis/redisinsight:latest
    ports: [ "5540:5540" ]

  firebase:
    image: andreysenov/firebase-tools
    command: firebase emulators:start --project nxtimer-dev --only database
    working_dir: /home/node
    volumes:
      - ./firebase.json:/home/node/firebase.json
    ports:
      - "4000:4000"
      - "9000:9000"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9100:9000"
      - "9101:9001"
    volumes:
      - nexus_minio:/data
    healthcheck:
      test: [ "CMD", "mc", "ready", "local" ]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: [ "/bin/sh", "-c" ]
    command:
      - |
        until /usr/bin/mc alias set local http://minio:9000 minioadmin minioadmin; do
          echo 'waiting for minio...'
          sleep 2
        done
        /usr/bin/mc mb --ignore-existing local/nexustimer-dev
        /usr/bin/mc anonymous set download local/nexustimer-dev
        echo 'minio init done'

  meilisearch:
    image: getmeili/meilisearch:v1.48
    ports:
      - "7700:7700"
    environment:
      MEILI_MASTER_KEY: ${MEILISEARCH_API_KEY}
    volumes:
      - nexus_meilisearch:/meili_data
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--spider",
          "-q",
          "http://127.0.0.1:7700/health"
        ]
      interval: 10s
      timeout: 5s
      retries: 5
volumes:
  nexus_mongo:
  nexus_minio:
  nexus_meilisearch: